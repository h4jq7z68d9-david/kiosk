<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>David Nicholson — Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Playfair+Display:ital,wght@0,700;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0c;
  --surface: #1a1a1a;
  --border: #2a2a2a;
  --border-mid: #333;
  --ink: #f0ede8;
  --ink2: #888480;
  --ink3: #777;
  --accent: #a8b8c8;
  --font: 'DM Sans', sans-serif;
  --serif: 'Playfair Display', serif;
  --nav-h: 56px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: var(--font); font-weight: 300;
  -webkit-font-smoothing: antialiased; overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 80;
  height: var(--nav-h); background: var(--bg);
  padding: 0 20px; display: flex; align-items: center; gap: 12px;
}
.nav-title {
  font-size: 20px; font-weight: 400; color: var(--ink);
  letter-spacing: 0.06em; text-transform: lowercase; white-space: nowrap;
}
.nav-title span { color: var(--ink2); font-weight: 300; margin-left: 8px; font-size: 14px; }
.nav-center { flex: 1; text-align: center; font-size: 14px; font-weight: 400; letter-spacing: 0.1em; text-transform: lowercase; color: var(--ink2); }
.nav-btn {
  background: none; border: 1px solid #666; border-radius: 20px;
  padding: 7px 18px; font-family: var(--font); font-size: 13px; font-weight: 400;
  letter-spacing: 0.14em; text-transform: lowercase; color: var(--ink);
  cursor: pointer; white-space: nowrap; transition: border-color 0.2s; display: inline-block;
}
.nav-btn:hover { border-color: var(--ink); }

/* ── GRID ── */
.grid-wrap { max-width: 1400px; margin: 0 auto; padding: calc(var(--nav-h) + 32px) 16px 80px; }
.grid { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-start; }

.card {
  width: calc(33.333% - 12px); aspect-ratio: 4/5;
  position: relative; overflow: hidden; cursor: pointer;
  background: var(--bg); border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
}
.card img {
  max-width: 100%; max-height: 100%; width: auto; height: auto;
  object-fit: contain; display: block; opacity: 0; transition: opacity 0.35s;
}
.card img.loaded { opacity: 1; }
.card:hover { opacity: 0.88; transition: opacity 0.2s; }

.skel { width: calc(33.333% - 12px); aspect-ratio: 4/5; border-radius: 2px; background: var(--surface); animation: sk 1.6s ease-in-out infinite; }
@keyframes sk { 0%,100%{opacity:0.4} 50%{opacity:0.7} }

@media (max-width: 600px) { .card, .skel { width: calc(50% - 6px); } }
@media (max-width: 380px) { .card, .skel { width: 100%; } }
@media (max-width: 700px) { nav { padding: 0 16px; } .nav-title { font-size: 17px; } }

/* ── DETAIL MODAL ── */
#detail-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.88); backdrop-filter: blur(6px);
  visibility: hidden; opacity: 0;
  transition: opacity 0.25s, visibility 0s linear 0.25s;
  display: flex; align-items: center; justify-content: center; padding: 24px;
}
#detail-overlay.on { visibility: visible; opacity: 1; transition: opacity 0.25s, visibility 0s; }

#detail-sheet {
  position: relative; background: #f5f2ed; border-radius: 16px;
  width: 100%; max-width: 900px; max-height: 92vh;
  display: flex; flex-direction: row; overflow: hidden;
  box-shadow: 0 32px 100px rgba(0,0,0,0.7);
}
@media (max-width: 680px) { #detail-sheet { flex-direction: column; max-height: 96vh; border-radius: 12px; } }

.modal-close {
  position: absolute; top: 14px; right: 14px; z-index: 20;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(0,0,0,0.1); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #6b6560; transition: background 0.15s;
}
.modal-close:hover { background: rgba(0,0,0,0.18); }

.modal-img-pane {
  flex: 1.2; min-width: 0; background: #ede9e4;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden; cursor: zoom-in;
}
.modal-img-pane img { width: 100%; height: 100%; object-fit: contain; display: block; padding: 32px; max-height: 92vh; }
@media (max-width: 680px) { .modal-img-pane { max-height: 52vw; min-height: 240px; } .modal-img-pane img { padding: 20px; } }

.img-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(0,0,0,0.15); border: none; border-radius: 50%;
  width: 40px; height: 40px; cursor: pointer; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  color: #1a1917; font-size: 20px; transition: background 0.15s;
}
.img-nav:hover { background: rgba(0,0,0,0.28); }
.img-nav-prev { left: 10px; }
.img-nav-next { right: 10px; }

.modal-info-pane {
  width: 300px; flex-shrink: 0;
  display: flex; flex-direction: column;
  border-left: 1px solid rgba(0,0,0,0.07); overflow-y: auto;
}
.modal-info-pane::-webkit-scrollbar { width: 0; }
@media (max-width: 680px) { .modal-info-pane { width: 100%; border-left: none; border-top: 1px solid rgba(0,0,0,0.07); } }

.modal-info-inner { padding: 32px 26px 36px; display: flex; flex-direction: column; gap: 14px; flex: 1; }

.d-title { font-family: var(--serif); font-size: 22px; font-weight: 700; color: #1a1917; line-height: 1.2; }
.d-desc { font-family: var(--serif); font-style: italic; font-size: 14px; color: #6b6560; line-height: 1.7; }

/* variant selector */
.variant-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #a8a39d; }
.variant-btns { display: flex; flex-wrap: wrap; gap: 8px; }
.variant-btn {
  background: #fff; border: 1.5px solid #ddd; border-radius: 8px;
  padding: 8px 14px; font-family: var(--font); font-size: 13px;
  color: #6b6560; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.variant-btn:hover { border-color: #a8a39d; color: #1a1917; }
.variant-btn.selected { border-color: #1a1917; background: #1a1917; color: #f5f2ed; }

.d-price { font-size: 20px; font-weight: 500; color: #1a1917; letter-spacing: -0.01em; }

.buy-section { margin-top: auto; padding-top: 20px; display: flex; flex-direction: column; gap: 10px; border-top: 1px solid rgba(0,0,0,0.08); }

.btn-buy {
  display: block; width: 100%; background: #1a1917; color: #f5f2ed;
  border: none; border-radius: 10px; padding: 16px; text-align: center;
  font-family: var(--font); font-size: 15px; font-weight: 500;
  letter-spacing: 0.02em; cursor: pointer; transition: opacity 0.15s; text-decoration: none;
}
.btn-buy:hover { opacity: 0.85; }
.btn-buy:disabled { opacity: 0.4; cursor: default; }

.badge-sold { display: inline-block; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #a8a39d; border: 1px solid #d0ccc7; border-radius: 20px; padding: 4px 10px; }

/* ── FULLSCREEN ── */
#fs-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.97); display: none;
  align-items: center; justify-content: center; padding: 20px; cursor: zoom-out;
}
#fs-overlay.on { display: flex; }
#fs-overlay img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; }
.fs-close {
  position: absolute; top: 16px; right: 16px; width: 36px; height: 36px;
  border-radius: 50%; background: rgba(255,255,255,0.12); border: none;
  color: #fff; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* ── FOOTER ── */
footer { border-top: 1px solid var(--border); padding: 28px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
.footer-copy { font-size: 12px; color: var(--ink3); letter-spacing: 0.06em; }
.footer-link { background: none; border: 1px solid #444; border-radius: 20px; color: var(--ink2); font-family: var(--font); font-size: 12px; font-weight: 400; letter-spacing: 0.12em; text-transform: lowercase; padding: 7px 16px; cursor: pointer; transition: border-color 0.2s, color 0.2s; text-decoration: none; display: inline-block; }
.footer-link:hover { border-color: var(--ink2); color: var(--ink); }

/* ── TOAST ── */
#toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--ink); color: #0c0c0c; font-family: var(--font); font-size: 12px; font-weight: 500; padding: 9px 18px; border-radius: 20px; opacity: 0; pointer-events: none; z-index: 1000; transition: opacity 0.2s, transform 0.2s; white-space: nowrap; }
#toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

<script>
const LAMBDA = 'https://doqg3wcta7.execute-api.us-east-1.amazonaws.com';
const SQUARE_APP_ID = 'sq0idp-6D-Q6hGLP9tk-medwFpxvQ';
const LOCATION_ID   = 'LYVD3ZGR3X4KE';

let products = [];
let curIdx = 0;
let curVariationId = null;

// ── FETCH ─────────────────────────────────
async function loadProducts() {
  try {
    const r = await fetch(LAMBDA + '/products');
    if (!r.ok) throw 0;
    const { products: raw } = await r.json();
    products = raw;
    renderGrid();
    document.getElementById('nav-count').textContent = ' — ' + products.length + ' works';
  } catch {
    document.getElementById('grid').innerHTML = '<p style="color:var(--ink3);padding:40px;width:100%">Could not load products.</p>';
  }
}

// ── GRID ──────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  products.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    if (p.img) {
      const img = document.createElement('img');
      img.alt = p.title;
      img.onload = () => img.classList.add('loaded');
      img.src = p.img;
      card.appendChild(img);
    }
    card.onclick = () => openDetail(i);
    grid.appendChild(card);
  });
}

// ── DETAIL ────────────────────────────────
function openDetail(idx) {
  curIdx = idx;
  populateDetail(products[idx]);
  document.getElementById('detail-overlay').classList.add('on');
}

function populateDetail(p) {
  const img = document.getElementById('d-img');
  img.src = p.img || ''; img.alt = p.title;
  document.getElementById('d-title').textContent = p.title;
  document.getElementById('d-desc').textContent  = p.desc || '';

  // Variant buttons
  const vWrap = document.getElementById('d-variants');
  vWrap.innerHTML = '';
  const firstV = p.variations?.[0];
  curVariationId = firstV?.id || null;

  (p.variations || []).forEach((v, i) => {
    const btn = document.createElement('button');
    btn.className = 'variant-btn' + (i === 0 ? ' selected' : '');
    btn.textContent = v.name;
    btn.onclick = () => selectVariant(p, v, btn);
    vWrap.appendChild(btn);
  });

  // Price
  document.getElementById('d-price').textContent = firstV?.price ? '$' + firstV.price : '';

  // Buy button
  renderBuyButton(p, firstV);
}

function selectVariant(p, v, btn) {
  curVariationId = v.id;
  document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('d-price').textContent = v.price ? '$' + v.price : '';
  renderBuyButton(p, v);
}

function renderBuyButton(p, v) {
  const buy = document.getElementById('buy-section');
  const cartUrl = `https://squareup.com/dashboard/items/library`;
  // Use Square's hosted checkout URL pattern
  buy.innerHTML = `<button class="btn-buy" onclick="checkout()">Add to Cart — $${v?.price || ''}</button>`;
}

function checkout() {
  const p = products[curIdx];
  if (!p || !curVariationId) return;
  // Square cart permalink
  const url = `https://square.link/u/${LOCATION_ID}?item=${curVariationId}`;
  window.open(url, '_blank');
}

function slideNav(dir) {
  curIdx = (curIdx + dir + products.length) % products.length;
  populateDetail(products[curIdx]);
}

function closeDetail() { document.getElementById('detail-overlay').classList.remove('on'); }
function overlayClick(e) { if (e.target === document.getElementById('detail-overlay')) closeDetail(); }

// ── FULLSCREEN ────────────────────────────
function openFS() {
  const p = products[curIdx];
  if (!p?.img) return;
  document.getElementById('fs-img').src = p.img;
  document.getElementById('fs-overlay').classList.add('on');
}
function closeFS() { document.getElementById('fs-overlay').classList.remove('on'); }

// ── TOAST ─────────────────────────────────
let tT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  clearTimeout(tT); tT = setTimeout(() => el.classList.remove('on'), 2600);
}

// ── UTILS ─────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function strip(h) { const d = document.createElement('div'); d.innerHTML = h; return d.textContent || ''; }

loadProducts();
</script>

<div id="gb-overlay" onclick="if(event.target===this)closeGB()" style="position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);visibility:hidden;opacity:0;transition:opacity 0.28s,visibility 0s linear 0.28s;display:flex;align-items:center;justify-content:center;padding:24px;">

        <input id="g-email" type="email" placeholder="your@email.com" autocomplete="off" autocapitalize="none" spellcheck="false" style="background:rgba(255,255,255,0.7);border:1.5px solid rgba(0,0,0,0.1);border-radius:6px;color:#1a1917;font-family:'DM Sans',sans-serif;font-size:16px;padding:12px 14px;outline:none;width:100%;-webkit-appearance:none;"></div>
      <div><label style="font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:lowercase;color:#6b6560;margin-bottom:5px;display:block;">note <span style="font-weight:300;text-transform:none;letter-spacing:0;color:#a8a39d">(optional)</span></label>
        <textarea id="g-msg" placeholder="Favourite piece, what brought you here…" spellcheck="false" style="background:rgba(255,255,255,0.7);border:1.5px solid rgba(0,0,0,0.1);border-radius:6px;color:#1a1917;font-family:'DM Sans',sans-serif;font-size:16px;padding:12px 14px;outline:none;width:100%;-webkit-appearance:none;resize:none;min-height:80px;line-height:1.5;"></textarea></div>
      <button onclick="submitGB()" style="background:#1a1917;border:none;border-radius:6px;color:#f5f2ed;padding:15px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;letter-spacing:0.12em;text-transform:lowercase;cursor:pointer;width:100%;margin-top:4px;">sign the guest book</button>
    </div>
    <div id="gb-entries" style="display:none;flex-direction:column;gap:8px;padding-top:14px;border-top:1px solid rgba(0,0,0,0.08);">
      <div style="font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:lowercase;color:#a8a39d;">recent visitors</div>
      <div id="gb-list"></div>
    </div>
  </div>
</div>
</div>

<footer>
  <span class="footer-copy">&copy; 2026 david nicholson</span>
  <div style="display:flex;gap:16px;align-items:center;">

<script>
const LAMBDA_URL = 'https://doqg3wcta7.execute-api.us-east-1.amazonaws.com';
let guests = [];
try { const s = localStorage.getItem('dna_guests'); if (s) guests = JSON.parse(s); } catch {}

function openGB() {
  const o = document.getElementById('gb-overlay');
  o.style.visibility = 'visible'; o.style.opacity = '1';
  o.style.transition = 'opacity 0.28s,visibility 0s';
  document.getElementById('export-btn').style.display = 'none';
  gbTapCount = 0; renderGuests();
}
function closeGB() {
  const o = document.getElementById('gb-overlay');
  o.style.opacity = '0'; o.style.visibility = 'hidden';
  o.style.transition = 'opacity 0.28s,visibility 0s linear 0.28s';
}

let gbTapCount = 0, gbTapTimer;
function gbTitleTap() {
  gbTapCount++;
  clearTimeout(gbTapTimer);
  if (gbTapCount >= 3) { gbTapCount = 0; document.getElementById('export-btn').style.display = 'inline-block'; }
  else gbTapTimer = setTimeout(() => { gbTapCount = 0; }, 600);
}

async function submitGB() {
  const name  = document.getElementById('g-name').value.trim();
  const email = document.getElementById('g-email').value.trim();
  const note  = document.getElementById('g-msg').value.trim();
  if (!name)                          { toast('please enter your name'); return; }
  if (!email || !email.includes('@')) { toast('please enter a valid email'); return; }
  guests.unshift({ name, email, note, date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) });
  try { localStorage.setItem('dna_guests', JSON.stringify(guests)); } catch {}
  document.getElementById('g-name').value = '';
  document.getElementById('g-email').value = '';
  document.getElementById('g-msg').value = '';
  renderGuests(); toast('thanks for signing!');
  // notify via Lambda
  try {
    await fetch(LAMBDA_URL + '/guestbook', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name, email, note })
    });
  } catch {}
}

function renderGuests() {
  const wrap = document.getElementById('gb-entries');
  const list = document.getElementById('gb-list');
  if (!guests.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex';
  list.innerHTML = guests.slice(0,40).map(e =>
    `<div style="background:rgba(255,255,255,0.5);border-radius:5px;padding:11px 13px;border:1px solid rgba(0,0,0,0.07);margin-bottom:6px;">
      <div style="font-size:14px;font-weight:500;color:#1a1917;">${esc(e.name)}</div>
      <div style="font-size:12px;color:#a8a39d;margin-top:2px;">${esc(e.date)}</div>
      ${e.note ? `<div style="font-size:14px;font-weight:300;color:#6b6560;margin-top:5px;line-height:1.55;">${esc(e.note)}</div>` : ''}
    </div>`
  ).join('');
}

function exportCSV() {
  if (!guests.length) { toast('no entries yet'); return; }
  const rows = [['Name','Email','Note','Date'], ...guests.map(e=>[e.name,e.email||'',e.note||'',e.date])];
  const csv  = rows.map(r=>r.map(c=>{const s=String(c);return(s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\n');
  const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),download:'guestbook-'+new Date().toISOString().slice(0,10)+'.csv'});
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('exported '+guests.length+' entries');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
