<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Gallery — David Nicholson">
<title>David Nicholson — Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Playfair+Display:ital,wght@0,700;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0c; --surface: #1a1a1a; --border: #2a2a2a; --border-mid: #333;
  --ink: #f0ede8; --ink2: #888480; --ink3: #777; --accent: #a8b8c8;
  --font: 'DM Sans', sans-serif; --serif: 'Playfair Display', serif; --nav-h: 56px;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--ink); font-family: var(--font); font-weight: 300; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
a { color: inherit; text-decoration: none; }

/* NAV */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 80; height: var(--nav-h); background: var(--bg); padding: 0 20px; display: flex; align-items: center; gap: 12px; }
.nav-title { font-size: 20px; font-weight: 400; color: var(--ink); letter-spacing: 0.06em; text-transform: lowercase; white-space: nowrap; }
.nav-title span { color: var(--ink2); font-weight: 300; margin-left: 8px; font-size: 14px; }
.nav-center { flex: 1; text-align: center; font-size: 14px; font-weight: 400; letter-spacing: 0.1em; text-transform: lowercase; color: var(--ink2); }
.nav-btn { background: none; border: 1px solid #666; border-radius: 20px; padding: 7px 18px; font-family: var(--font); font-size: 13px; font-weight: 400; letter-spacing: 0.14em; text-transform: lowercase; color: var(--ink); cursor: pointer; white-space: nowrap; transition: border-color 0.2s; text-decoration: none; display: inline-block; }
.nav-btn:hover { border-color: var(--ink); }

/* GRID */
.grid-wrap { max-width: 1400px; margin: 0 auto; padding: calc(var(--nav-h) + 32px) 16px 80px; }
.grid { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-start; }
@media (max-width: 700px) { nav { padding: 0 16px; } .nav-title { font-size: 17px; } .grid-wrap { padding: calc(var(--nav-h) + 20px) 10px 60px; } .grid { gap: 10px; } }
.card { width: calc(33.333% - 12px); aspect-ratio: 4/5; position: relative; overflow: hidden; cursor: pointer; background: var(--bg); border-radius: 2px; display: flex; align-items: center; justify-content: center; }
.card img { max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; display: block; opacity: 0; transition: opacity 0.35s; }
.card img.loaded { opacity: 1; }
.card:hover { opacity: 0.88; transition: opacity 0.2s; }
@media (max-width: 600px) { .card { width: calc(50% - 6px); } }
@media (max-width: 380px) { .card { width: 100%; } }
.skel { width: calc(33.333% - 12px); aspect-ratio: 4/5; border-radius: 2px; background: var(--surface); animation: sk 1.6s ease-in-out infinite; }
@keyframes sk { 0%,100%{opacity:0.4} 50%{opacity:0.7} }

/* DETAIL MODAL — desktop */
#detail-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.88); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); visibility: hidden; opacity: 0; transition: opacity 0.25s, visibility 0s linear 0.25s; display: flex; align-items: center; justify-content: center; padding: 24px; }
#detail-overlay.on { visibility: visible; opacity: 1; transition: opacity 0.25s, visibility 0s; }
#detail-sheet { position: relative; background: #f5f2ed; border-radius: 16px; width: 100%; max-width: 900px; max-height: 92vh; display: flex; flex-direction: row; overflow: hidden; box-shadow: 0 32px 100px rgba(0,0,0,0.7); }

/* MOBILE — bottom sheet */
@media (max-width: 680px) {
  #detail-overlay { padding: 0; align-items: flex-end; }
  #detail-sheet { flex-direction: column; max-height: 94dvh; max-width: 100%; border-radius: 20px 20px 0 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
  #detail-sheet::before { content: ''; display: block; width: 36px; height: 4px; background: rgba(0,0,0,0.15); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
  .modal-img-pane { flex: none; width: 100%; max-height: none; min-height: none; aspect-ratio: 1/1; cursor: default; }
  .modal-img-pane img { width: 100%; height: 100%; object-fit: contain; padding: 24px; max-height: none; }
  .modal-info-pane { width: 100%; border-left: none; border-top: 1px solid rgba(0,0,0,0.07); overflow-y: visible; }
  .modal-info-inner { padding: 24px 20px 40px; }
  .buy-section { margin-top: 20px; }
  .img-nav { display: none; }
}

.modal-close { position: absolute; top: 14px; right: 14px; z-index: 20; width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,0.1); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #6b6560; transition: background 0.15s; }
.modal-close:hover { background: rgba(0,0,0,0.18); }
.modal-img-pane { flex: 1.2; min-width: 0; background: #ede9e4; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; cursor: zoom-in; }
.modal-img-pane img { width: 100%; height: 100%; object-fit: contain; display: block; padding: 32px; max-height: 92vh; }
.img-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.15); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; color: #1a1917; font-size: 20px; transition: background 0.15s; }
.img-nav:hover { background: rgba(0,0,0,0.28); }
.img-nav-prev { left: 10px; }
.img-nav-next { right: 10px; }
.img-nav.hidden { opacity: 0; pointer-events: none; }
.modal-info-pane { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; border-left: 1px solid rgba(0,0,0,0.07); overflow-y: auto; }
.modal-info-pane::-webkit-scrollbar { width: 0; }
.modal-info-inner { padding: 32px 26px 36px; display: flex; flex-direction: column; gap: 12px; flex: 1; }
.d-title { font-family: var(--serif); font-size: 22px; font-weight: 700; color: #1a1917; line-height: 1.2; }
.d-desc { font-family: var(--serif); font-style: italic; font-size: 14px; color: #6b6560; line-height: 1.7; }

/* VARIANT SELECTOR */
.variant-label { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: lowercase; color: #a8a39d; }
.variant-btns { display: flex; flex-wrap: wrap; gap: 8px; }
.variant-btn { background: rgba(0,0,0,0.04); border: 1.5px solid rgba(0,0,0,0.12); border-radius: 8px; padding: 8px 14px; font-family: var(--font); font-size: 13px; font-weight: 400; color: #4a4744; cursor: pointer; transition: all 0.15s; white-space: normal; line-height: 1.3; }
.variant-btn:hover { border-color: #1a1917; }
.variant-btn.selected { background: #1a1917; border-color: #1a1917; color: #f5f2ed; }
.d-price-display { font-size: 22px; font-weight: 400; color: #1a1917; letter-spacing: -0.01em; }

/* BUY SECTION */
.buy-section { margin-top: auto; padding-top: 20px; display: flex; flex-direction: column; gap: 10px; border-top: 1px solid rgba(0,0,0,0.08); }
.btn-buy { display: block; width: 100%; background: #1a1917; color: #f5f2ed; border: none; border-radius: 10px; padding: 16px; text-align: center; font-family: var(--font); font-size: 15px; font-weight: 500; letter-spacing: 0.02em; cursor: pointer; transition: opacity 0.15s; }
.btn-buy:hover { opacity: 0.85; }
.btn-buy:disabled { opacity: 0.4; cursor: default; }
.badge-sold { display: inline-block; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #a8a39d; border: 1px solid #d0ccc7; border-radius: 20px; padding: 4px 10px; }

/* FULLSCREEN */
#fs-overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.97); display: none; align-items: center; justify-content: center; padding: 20px; cursor: zoom-out; }
#fs-overlay.on { display: flex; }
#fs-overlay img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; }
.fs-close { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.12); border: none; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* FOOTER */
footer { border-top: 1px solid var(--border); padding: 28px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
.footer-copy { font-size: 12px; color: var(--ink3); letter-spacing: 0.06em; }
.footer-gb-btn { background: none; border: 1px solid #444; border-radius: 20px; color: var(--ink2); font-family: var(--font); font-size: 12px; font-weight: 400; letter-spacing: 0.12em; text-transform: lowercase; padding: 7px 16px; cursor: pointer; transition: border-color 0.2s, color 0.2s; text-decoration: none; display: inline-block; }
.footer-gb-btn:hover { border-color: var(--ink2); color: var(--ink); }

/* TOAST */
#toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--ink); color: #0c0c0c; font-family: var(--font); font-size: 12px; font-weight: 500; padding: 9px 18px; border-radius: 20px; opacity: 0; pointer-events: none; z-index: 1000; transition: opacity 0.2s, transform 0.2s; white-space: nowrap; }
#toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<nav>
  <a class="nav-title" href="/index.html">david nicholson<span id="nav-count"></span></a>
  <div class="nav-center">gallery</div>
  <a class="nav-btn" href="https://instagram.com/dave_nichol_son">follow on instagram</a>
</nav>

<div class="grid-wrap">
  <div class="grid" id="grid">
    <div class="skel"></div><div class="skel"></div><div class="skel"></div>
    <div class="skel"></div><div class="skel"></div><div class="skel"></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div id="detail-overlay" onclick="overlayClick(event)">
  <div id="detail-sheet">
    <button class="modal-close" onclick="closeDetail()">✕</button>
    <div class="modal-img-pane" id="modal-img-pane" onclick="openFS()">
      <button class="img-nav img-nav-prev" id="nav-prev" onclick="event.stopPropagation();slideNav(-1)">‹</button>
      <img id="d-img" src="" alt="">
      <button class="img-nav img-nav-next" id="nav-next" onclick="event.stopPropagation();slideNav(1)">›</button>
    </div>

      <div class="modal-info-inner">
        <div class="d-title" id="d-title"></div>
        <div class="d-desc"  id="d-desc"></div>
        <div class="variant-label" id="variant-label" style="display:none">size</div>
        <div class="variant-btns" id="d-variants"></div>
        <div class="d-price-display" id="d-price"></div>
        <div class="buy-section" id="buy-section"></div>
      </div>
    </div>
  </div>
</div>

<!-- FULLSCREEN -->
<div id="fs-overlay" onclick="closeFS()">
  <button class="fs-close" onclick="event.stopPropagation();closeFS()">✕</button>
  <img id="fs-img" src="" alt="">
</div>

<div id="toast"></div>

<script>
const LAMBDA = 'https://doqg3wcta7.execute-api.us-east-1.amazonaws.com';

let products = [];
let curIdx = 0;
let curVariationId = null;

async function loadProducts() {
  try {
    const r = await fetch(LAMBDA + '/products');
    if (!r.ok) throw 0;
    const raw = await r.json();
    products = raw.map(p => ({
      id:         p.id,
      title:      p.name || p.title,
      desc:       p.description || '',
      img:        p.image_url || p.img || null,
      url:        p.url || null,
      variations: (p.variations || []).map(v => ({
        id:    v.id,
        name:  v.name,
        price: v.price_money ? (v.price_money.amount / 100).toFixed(0) : v.price || '',
      })),
    }));
    // Shuffle so order varies each load
    for (let i = products.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [products[i], products[j]] = [products[j], products[i]];
    }
    renderGrid();
    document.getElementById('nav-count').textContent = ' — ' + products.length + ' works';
  } catch {
    document.getElementById('grid').innerHTML =
      '<p style="color:var(--ink3);padding:40px;grid-column:1/-1">could not load products.</p>';
  }
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  products.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    if (p.img) {
      const img = document.createElement('img');
      img.alt = p.title;
      img.onload = () => img.classList.add('loaded');
      img.src = p.img;
      card.appendChild(img);
    }
    card.onclick = () => openDetail(i);
    grid.appendChild(card);
  });
}

function openDetail(idx) {
  curIdx = idx;
  curVariationId = null;
  populateDetail(products[idx]);
  document.getElementById('detail-overlay').classList.add('on');
  document.getElementById('detail-sheet').scrollTop = 0;
}

function populateDetail(p) {
  document.getElementById('d-img').src = p.img || '';
  document.getElementById('d-img').alt = p.title;
  document.getElementById('d-title').textContent = p.title;
  document.getElementById('d-desc').textContent  = p.desc || '';

  const vWrap  = document.getElementById('d-variants');
  const vLabel = document.getElementById('variant-label');
  const priceEl = document.getElementById('d-price');
  vWrap.innerHTML = '';
  curVariationId = null;

  if (p.variations && p.variations.length > 0) {
    vLabel.style.display = 'block';
    p.variations.forEach((v, i) => {
      const btn = document.createElement('button');
      btn.className = 'variant-btn' + (i === 0 ? ' selected' : '');
      btn.textContent = v.name + (v.price ? '  —  $' + v.price : '');
      btn.onclick = () => selectVariant(v, btn, priceEl);
      vWrap.appendChild(btn);
    });
    const first = p.variations[0];
    curVariationId = first.id;
    priceEl.textContent = first.price ? '$' + first.price : '';
  } else {
    vLabel.style.display = 'none';
    priceEl.textContent = '';
  }

  renderBuyButton();
}

function selectVariant(v, btn, priceEl) {
  curVariationId = v.id;
  document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  priceEl.textContent = v.price ? '$' + v.price : '';
  renderBuyButton();
}

function renderBuyButton() {
  const p = products[curIdx];
  const buy = document.getElementById('buy-section');
  if (!p) return;
  buy.innerHTML = `<button class="btn-buy" onclick="checkout()">buy this print</button>`;
}

async function checkout() {
  const p = products[curIdx];
  if (!p) return;
  const btn = document.querySelector('#buy-section .btn-buy');
  if (btn) { btn.disabled = true; btn.textContent = 'one moment…'; }
  try {
    const r = await fetch(LAMBDA + '/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ variation_id: curVariationId, item_id: p.id }),
    });
    const data = await r.json();
    if (data.checkout_url) {
      window.location.href = data.checkout_url;
    } else {
      throw new Error('no checkout url');
    }
  } catch {
    toast('something went wrong — try again');
    if (btn) { btn.disabled = false; btn.textContent = 'buy this print'; }
  }
}

function slideNav(dir) {
  curIdx = (curIdx + dir + products.length) % products.length;
  populateDetail(products[curIdx]);
  document.getElementById('detail-sheet').scrollTop = 0;
}

function closeDetail() { document.getElementById('detail-overlay').classList.remove('on'); }
function overlayClick(e) { if (e.target === document.getElementById('detail-overlay')) closeDetail(); }

function openFS() {
  if (window.innerWidth <= 680) return;
  const p = products[curIdx];
  if (!p?.img) return;
  document.getElementById('fs-img').src = p.img;
  document.getElementById('fs-overlay').classList.add('on');
}
function closeFS() { document.getElementById('fs-overlay').classList.remove('on'); }

// Swipe on mobile
let swipeStartX = 0;
document.getElementById('detail-sheet').addEventListener('touchstart', e => {
  swipeStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('detail-sheet').addEventListener('touchend', e => {
  if (window.innerWidth > 680) return;
  const dx = e.changedTouches[0].clientX - swipeStartX;
  if (Math.abs(dx) > 50) slideNav(dx < 0 ? 1 : -1);
}, { passive: true });

let tT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  clearTimeout(tT); tT = setTimeout(() => el.classList.remove('on'), 2600);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function strip(h) { const d = document.createElement('div'); d.innerHTML = h; return d.textContent || ''; }

loadProducts();
</script>

<!-- GUESTBOOK MODAL -->
<div id="gb-overlay" onclick="gbOverlayClick(event)" style="position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);visibility:hidden;opacity:0;transition:opacity 0.28s,visibility 0s linear 0.28s;display:flex;align-items:center;justify-content:center;padding:24px;">
<div id="gb-sheet" style="background:#f5f2ed;border-radius:12px;width:100%;max-width:480px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,0.7);">
  <div style="display:flex;align-items:center;padding:26px 26px 14px;gap:10px;flex-shrink:0;">
    <div id="gb-title" style="font-family:var(--serif);font-size:22px;font-weight:700;color:#1a1917;flex:1;cursor:default;" onclick="gbTitleTap()">guest book</div>
    <button id="export-btn" style="display:none;background:rgba(0,0,0,0.07);border:none;border-radius:5px;padding:5px 10px;font-family:var(--font);font-size:11px;color:#6b6560;cursor:pointer;" onclick="exportCSV()">export csv</button>
    <button onclick="closeGB()" style="width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,0.07);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:#6b6560;">✕</button>
  </div>
  <div style="flex:1;overflow-y:auto;padding:0 26px 32px;display:flex;flex-direction:column;gap:14px;">
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div><label style="font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:lowercase;color:#6b6560;margin-bottom:5px;display:block;">name</label>
        <input id="g-name" type="text" placeholder="Your name" autocomplete="off" autocorrect="off" spellcheck="false" style="background:rgba(255,255,255,0.7);border:1.5px solid rgba(0,0,0,0.1);border-radius:6px;color:#1a1917;font-family:var(--font);font-size:16px;padding:12px 14px;outline:none;width:100%;-webkit-appearance:none;"></div>
      <div><label style="font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:lowercase;color:#6b6560;margin-bottom:5px;display:block;">email</label>
        <input id="g-email" type="email" placeholder="your@email.com" autocomplete="off" autocapitalize="none" spellcheck="false" style="background:rgba(255,255,255,0.7);border:1.5px solid rgba(0,0,0,0.1);border-radius:6px;color:#1a1917;font-family:var(--font);font-size:16px;padding:12px 14px;outline:none;width:100%;-webkit-appearance:none;"></div>
      <div><label style="font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:lowercase;color:#6b6560;margin-bottom:5px;display:block;">note <span style="font-weight:300;text-transform:none;letter-spacing:0;color:#a8a39d">(optional)</span></label>
        <textarea id="g-msg" placeholder="Favourite piece, what brought you here…" spellcheck="false" style="background:rgba(255,255,255,0.7);border:1.5px solid rgba(0,0,0,0.1);border-radius:6px;color:#1a1917;font-family:var(--font);font-size:16px;padding:12px 14px;outline:none;width:100%;-webkit-appearance:none;resize:none;min-height:80px;line-height:1.5;"></textarea></div>
      <button onclick="submitGB()" style="background:#1a1917;border:none;border-radius:6px;color:#f5f2ed;padding:15px;font-family:var(--font);font-size:13px;font-weight:400;letter-spacing:0.12em;text-transform:lowercase;cursor:pointer;width:100%;margin-top:4px;">sign the guest book</button>
    </div>
    <div id="gb-entries" style="display:none;flex-direction:column;gap:8px;padding-top:14px;border-top:1px solid rgba(0,0,0,0.08);">
      <div style="font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:lowercase;color:#a8a39d;">recent visitors</div>
      <div id="gb-list"></div>
    </div>
  </div>
</div>
</div>

<footer>
  <span class="footer-copy">&copy; 2026 david nicholson</span>
  <div style="display:flex;gap:16px;align-items:center;">
    <a href="mailto:dave@davepainting.com" class="footer-gb-btn">contact</a>
    <button class="footer-gb-btn" onclick="openGB()">guest book</button>
  </div>

<script>
let guests = [];
try { const s = localStorage.getItem('dna_guests'); if (s) guests = JSON.parse(s); } catch {}

function openGB() {
  document.getElementById('gb-overlay').style.cssText += ';visibility:visible;opacity:1;transition:opacity 0.28s,visibility 0s;';
  document.getElementById('export-btn').style.display = 'none';
  gbTapCount = 0; renderGuests();
}
function closeGB() {
  const o = document.getElementById('gb-overlay');
  o.style.opacity = '0'; o.style.visibility = 'hidden';
  o.style.transition = 'opacity 0.28s,visibility 0s linear 0.28s';
}
function gbOverlayClick(e) { if (e.target === document.getElementById('gb-overlay')) closeGB(); }

let gbTapCount = 0, gbTapTimer;
function gbTitleTap() {
  gbTapCount++;
  clearTimeout(gbTapTimer);
  if (gbTapCount >= 3) { gbTapCount = 0; document.getElementById('export-btn').style.display = 'inline-block'; }
  else gbTapTimer = setTimeout(() => { gbTapCount = 0; }, 600);
}

function submitGB() {
  const name  = document.getElementById('g-name').value.trim();
  const email = document.getElementById('g-email').value.trim();
  const msg   = document.getElementById('g-msg').value.trim();
  if (!name)                         { toast('please enter your name'); return; }
  if (!email || !email.includes('@')){ toast('please enter a valid email'); return; }
  guests.unshift({ name, email, msg,
    date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) });
  try { localStorage.setItem('dna_guests', JSON.stringify(guests)); } catch {}
  document.getElementById('g-name').value = '';
  document.getElementById('g-email').value = '';
  document.getElementById('g-msg').value = '';
  renderGuests(); toast('thanks for signing!');
}

function renderGuests() {
  const wrap = document.getElementById('gb-entries');
  const list = document.getElementById('gb-list');
  if (!guests.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex';
  list.innerHTML = guests.slice(0,40).map(e =>
    `<div style="background:rgba(255,255,255,0.5);border-radius:5px;padding:11px 13px;border:1px solid rgba(0,0,0,0.07);margin-bottom:6px;">
      <div style="font-size:14px;font-weight:500;color:#1a1917;">${esc(e.name)}</div>
      <div style="font-size:12px;color:#a8a39d;margin-top:2px;">${esc(e.date)}</div>
      ${e.msg ? `<div style="font-size:14px;font-weight:300;color:#6b6560;margin-top:5px;line-height:1.55;">${esc(e.msg)}</div>` : ''}
    </div>`
  ).join('');
}

function exportCSV() {
  if (!guests.length) { toast('no entries yet'); return; }
  const rows = [['Name','Email','Note','Date'], ...guests.map(e=>[e.name,e.email||'',e.msg||'',e.date])];
  const csv  = rows.map(r=>r.map(c=>{const s=String(c);return(s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\n');
  const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),download:'guestbook-'+new Date().toISOString().slice(0,10)+'.csv'});
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
</script>
</body>
</html>
