name: Deploy to S3 + CloudFront
on:
  push:
    branches: [main]
permissions:
  id-token: write
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate print pages
        run: node --input-type=module < generate-prints.js
      - name: Upload to S3
        run: |
aws s3 sync . s3://kiosk.davidnicholsonllc \
            --exclude "*" \
            --include "*.html" \
            --include "prints/*.html" \
            --include "*.png" \
            --include "*.jpg" \
            --include "*.xml" \
            --include "*.txt" \
            --include "*.js" \
            --include "*.webmanifest" \
            --exclude "receipts/*" \
            --delete
      - name: Deploy Lambda
        run: |
          zip lambda.zip index.mjs
          aws lambda update-function-code \
            --function-name dna-kiosk \
            --zip-file fileb://lambda.zip
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E31J8ASEUTGXD9 \
            --paths "/*"
          aws cloudfront create-invalidation \
            --distribution-id E2EJH38GWGPEPG \
            --paths "/*"
