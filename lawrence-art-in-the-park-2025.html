<style>
:root {
  --bg: #f1f3f5; --surface: #e4e8ec; --border: #d0d6dc; --border-mid: #c2c9d0;
  --ink: #2b3640; --ink2: #586470; --ink3: #697480;
  --accent: #e6b400; --accent-ink: #b58600;
  --font: 'Jost', Futura, 'Trebuchet MS', Arial, sans-serif; --nav-h: 56px;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--ink); font-family: var(--font);
  font-weight: 300; -webkit-font-smoothing: antialiased;
  min-height: 100vh; display: flex; flex-direction: column; padding-top: var(--nav-h);
}
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 80; height: var(--nav-h); background: var(--bg); padding: 0 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
@media (min-width: 701px) { nav { padding: 0 40px; } }
@media (min-width: 1100px) { nav { padding: 0 60px; } }
.nav-title { font-size: 20px; font-weight: 400; color: var(--ink); letter-spacing: 0.06em; text-transform: lowercase; white-space: nowrap; flex: 1; text-decoration: none; display: flex; align-items: center; }
.nav-links { display: flex; align-items: center; gap: 8px; }
.nav-btn { background: none; border: 1px solid var(--border-mid); border-radius: 20px; padding: 7px 18px; font-family: var(--font); font-size: 13px; font-weight: 400; letter-spacing: 0.14em; text-transform: lowercase; color: var(--ink); cursor: pointer; white-space: nowrap; transition: border-color 0.2s; text-decoration: none; display: inline-block; }
.nav-btn:hover { border-color: var(--ink); }
main { flex: 1; width: 100%; max-width: 780px; margin: 0 auto; padding: 0 40px; box-sizing: border-box; }
.lead { margin: 48px 0 8px; text-align: center; }
.show-title { font-size: clamp(26px, 5vw, 40px); font-weight: 300; letter-spacing: 0.04em; text-transform: lowercase; color: var(--ink); line-height: 1.15; }
.show-meta { margin: 14px 0 0; font-size: 14px; font-weight: 400; letter-spacing: 0.1em; text-transform: lowercase; color: var(--ink3); line-height: 1.7; }
.plates { margin: 56px 0 8px; display: flex; flex-direction: column; gap: 56px; }
.plate { width: 100%; opacity: 0; transform: translateY(18px); animation: rise 1s cubic-bezier(0.22, 0.61, 0.36, 1) forwards; }
.plate:nth-child(1) { animation-delay: 0.10s; }
.plate:nth-child(2) { animation-delay: 0.28s; }
.plate img { display: block; width: 100%; height: auto; background: #e7eaed; }
@keyframes rise { to { opacity: 1; transform: translateY(0); } }
@media (prefers-reduced-motion: reduce) { .plate { animation: none; opacity: 1; transform: none; } }
footer { border-top: 1px solid var(--border); margin-top: 64px; padding: 28px 40px 48px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
.footer-copy { font-size: 12px; color: var(--ink3); letter-spacing: 0.06em; }
.footer-link { background: none; border: none; color: var(--ink2); font-family: var(--font); font-size: 12px; font-weight: 400; letter-spacing: 0.12em; text-transform: lowercase; padding: 0; cursor: pointer; transition: color 0.2s; text-decoration: none; display: inline-block; }
.footer-link:hover { color: var(--ink); }
@media (max-width: 600px) {
  main { padding: 0 20px; }
  .lead { margin-top: 36px; }
  .show-title { font-size: 24px; }
  .plates { gap: 36px; margin-top: 44px; }
  footer { padding: 24px 20px 40px; }
}

  </div>

<main>

    <h1 class="show-title">lawrence art in the park</h1>

  </div>

  <div class="plates">
    <figure class="plate">

    </figure>
    <figure class="plate">
      <img src="https://davidnicholsonart.com/past/lawrence2025_2.jpeg" alt="Lawrence Art in the Park 2025" loading="lazy">

  </div>

</html>
