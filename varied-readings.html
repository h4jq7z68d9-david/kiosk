<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varied Readings — David Nicholson</title>
<meta name="description" content="Varied Readings — paintings in pairs by David Nicholson. Phoenix Gallery, Lawrence, KS, April 2026.">
<meta property="og:title" content="Varied Readings — David Nicholson">
<meta property="og:description" content="Work in pairs. Phoenix Gallery, Lawrence KS.">
<meta property="og:image" content="https://davidnicholsonart.com/og-image.jpg">
<link rel="icon" type="image/png" sizes="96x96" href="favicon96.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f1f3f5;
  --ink: #2b3640;
  --ink2: #586470;
  --ink3: #697480;
  --accent: #e6b400; --accent-ink: #b58600;
  --font: 'DM Sans', sans-serif;
  --serif: 'DM Serif Display', serif;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  max-width: 780px;
  margin: 0 auto;
  width: 100%;
  padding: 40px 40px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  box-sizing: border-box;
}
.header-title {
  font-family: var(--font);
  font-size: 20px;
  font-weight: 400;
  letter-spacing: 0.06em;
  text-transform: lowercase;
  color: var(--ink);
}
.header-meta {
  text-align: right;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: lowercase;
  color: var(--ink);
  line-height: 1.9;
  padding-top: 6px;
}
.header-meta a { color: var(--accent-ink); text-decoration: none; }

main {
  flex: 1;
  width: 100%;
  max-width: 780px;
  margin: 0 auto;
  padding: 0 40px;
  box-sizing: border-box;
}

.lead {
  max-width: 620px;
  margin: 56px auto 8px;
}
.lead .kicker {
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent-ink);
  margin-bottom: 16px;
}
.lead p {
  font-size: 16px;
  font-weight: 300;
  line-height: 1.85;
  color: var(--ink2);
}

.plates {
  margin: 64px auto 8px;
  display: flex;
  flex-direction: column;
  gap: 56px;
}
.plate {
  width: 100%;
  opacity: 0;
  transform: translateY(18px);
  animation: rise 1s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
}
.plate:nth-child(1) { animation-delay: 0.10s; }
.plate:nth-child(2) { animation-delay: 0.28s; }
.plate:nth-child(3) { animation-delay: 0.46s; }
.plate img {
  display: block;
  width: 100%;
  height: auto;
  background: #e7eaed;
}
@keyframes rise {
  to { opacity: 1; transform: translateY(0); }
}
@media (prefers-reduced-motion: reduce) {
  .plate { animation: none; opacity: 1; transform: none; }
}

footer {
  width: 100%;
  max-width: 780px;
  margin: 64px auto 40px;
  padding: 0 40px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  box-sizing: border-box;
}
.footer-copy { font-size: 11px; color: var(--ink3); letter-spacing: 0.08em; }
.footer-link {
  font-size: 20px; letter-spacing: 0.06em; text-transform: lowercase;
  color: var(--accent-ink); text-decoration: none; font-weight: 400;
  transition: opacity 0.2s;
}
.footer-link:hover { opacity: 0.7; }

@media (max-width: 600px) {
  header { padding: 28px 20px 0; }
  .header-meta { text-align: left; }
  main { padding: 0 20px; }
  .lead { margin-top: 40px; }
  .lead p { font-size: 15px; }
  .plates { gap: 36px; margin-top: 44px; }
  footer { padding: 0 20px; margin-top: 44px; }
}
</style>
</head>
<body>

<header>
  <div class="header-title">varied readings</div>
  <div class="header-meta">
    April 2026<br>
    <a href="https://www.phoenixgalleryart.com" target="_blank" rel="noopener">Phoenix Gallery — Lawrence, KS</a>
  </div>
</header>

<main>
  <div class="lead">
    <div class="kicker">The Show</div>
    <p>Varied Readings presented work in pairs, each grouping an exploration of adjacent subject matter approached from shifting compositional and chromatic vantage points.</p>
  </div>

  <div class="plates">
    <figure class="plate">
      <img src="https://davidnicholsonart.com/4_26_varied_readings/1.jpg" alt="Varied Readings at Phoenix Gallery, Lawrence, KS" loading="lazy">
    </figure>
    <figure class="plate">
      <img src="https://davidnicholsonart.com/4_26_varied_readings/2.jpg" alt="Varied Readings at Phoenix Gallery, Lawrence, KS" loading="lazy">
    </figure>
    <figure class="plate">
      <img src="https://davidnicholsonart.com/4_26_varied_readings/3.jpg" alt="Varied Readings at Phoenix Gallery, Lawrence, KS" loading="lazy">
    </figure>
  </div>
</main>

<footer>
  <span class="footer-copy">&copy; 2026</span>
  <a class="footer-link" href="/index.html">david nicholson</a>
</footer>

</body>
</html>
